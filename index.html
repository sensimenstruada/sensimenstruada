<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Neon</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#120012;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.panel{
width:380px;
background:#1a001a;
border:2px solid #ff1493;
border-radius:25px;
padding:15px;
box-shadow:0 0 20px #ff1493;
display:flex;
}

.sidebar{
width:70px;
display:flex;
flex-direction:column;
gap:15px;
}

.icon{
width:55px;
height:55px;
border-radius:15px;
background:#250025;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
}

.icon.active{
background:#ff1493;
box-shadow:0 0 15px #ff1493;
}

.content{
flex:1;
margin-left:15px;
}

h1{
color:#ff1493;
margin-bottom:15px;
}

.option{
background:#250025;
padding:15px;
border-radius:15px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.switch{
position:relative;
width:60px;
height:30px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#444;
border-radius:30px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
height:24px;
width:24px;
left:3px;
top:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#ff1493;
box-shadow:0 0 10px #ff1493;
}

input:checked + .slider:before{
transform:translateX(30px);
}
</style>
</head>

<body>

<div class="panel">

<div class="sidebar">
<div class="icon active">🎯</div>
<div class="icon">🔫</div>
<div class="icon">⚙️</div>
<div class="icon">🧩</div>
<div class="icon">📦</div>
</div>

<div class="content">

<h1>MIRA</h1>

<div class="option">
<span>Mira Estável</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Precisão</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="option">
<span>Modo Competitivo</span>
<label class="switch">
<input type="checkbox">
<span class="slider"></span>
</label>
</div>

</div>

</div>

</body>
</html>
