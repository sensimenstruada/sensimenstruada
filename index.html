<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Neon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("fundo.jpg") center/cover no-repeat;
    color:white;
}

.panel{
    width:380px;
    background:rgba(35,0,20,.88);
    border:2px solid #ff1493;
    border-radius:20px;
    padding:20px;
    box-shadow:
    0 0 10px #ff1493,
    0 0 30px #ff1493;
    backdrop-filter:blur(6px);
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    color:white;
    background:#620032;
}

.tab.active{
    background:#ff1493;
    box-shadow:0 0 15px #ff1493;
}

.option{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:14px 0;
}

.switch{
    position:relative;
    width:52px;
    height:28px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#444;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.slider:before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

input:checked + .slider{
    background:#ff1493;
}

input:checked + .slider:before{
    transform:translateX(24px);
}

.range{
    width:100%;
    margin-top:15px;
    accent-color:#ff1493;
}

.value{
    text-align:center;
    margin-top:10px;
    margin-bottom:15px;
}

select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ff1493;
    background:#220015;
    color:white;
}

.btn{
    width:100%;
    margin-top:20px;
    border:none;
    padding:16px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(
    90deg,
    #ff1493,
    #8a0048
    );
    box-shadow:0 0 15px #ff1493;
}

.status{
    display:none;
    margin-top:15px;
    text-align:center;
    background:#7a0041;
    padding:10px;
    border-radius:10px;
}

.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
    radial-gradient(#fff 1px, transparent 1px);
    background-size:35px 35px;
    opacity:.25;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="panel">

    <div class="tabs">
        <button class="tab active">FUNÇÕES</button>
        <button class="tab">INFO</button>
    </div>

    <div class="option">
        <span>Auxílio</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <span>Tirar Tremedeira</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <span>120 FPS</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <input
    class="range"
    type="range"
    min="0"
    max="100"
    value="30"
    id="controle">

    <div class="value">
        Valor: <span id="valor">30</span>
    </div>

    <select>
        <option>Leve</option>
        <option>Médio</option>
        <option>Forte</option>
    </select>

    <button class="btn" onclick="aplicar()">
        APLICAR
    </button>

    <div class="status" id="status">
        Aplicado com sucesso!
    </div>

</div>

<script>
const controle = document.getElementById("controle");
const valor = document.getElementById("valor");

controle.addEventListener("input",()=>{
    valor.textContent = controle.value;
});

function aplicar(){
    document.getElementById("status").style.display="block";
}
</script>

</body>
</html>
